name: Build ImmortalWrt J1900 Ultimate

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: "ImmortalWrt release version"
        required: true
        default: "25.12.1"
      target:
        description: "Target"
        required: true
        default: "x86/64"
      profile:
        description: "Profile"
        required: true
        default: "generic"
      rootfs_mb:
        description: "RootFS partition size in MB, only for imagebuilder CONFIG_TARGET_ROOTFS_PARTSIZE"
        required: true
        default: "16384"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip \
            zlib1g-dev file wget curl qemu-utils zstd

      - name: Prepare variables
        id: vars
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.immortalwrt_version }}"
          TARGET="${{ github.event.inputs.target }}"
          TARGET_PATH="${TARGET}"
          BASE_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/${TARGET_PATH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "target_path=${TARGET_PATH}" >> "$GITHUB_OUTPUT"
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Download ImageBuilder
        shell: bash
        run: |
          set -eux
          BASE_URL="${{ steps.vars.outputs.base_url }}"
          mkdir -p ib
          cd ib
          INDEX="$(curl -fsSL "${BASE_URL}/")"
          echo "$INDEX" > index.html

          # Try common ImageBuilder archive names from directory listing
          IB_FILE="$(grep -oE 'immortalwrt-imagebuilder-[^"]+x86-64[^"]+\.Linux-x86_64\.tar\.(zst|xz)' index.html | head -n 1 || true)"
          if [ -z "$IB_FILE" ]; then
            IB_FILE="$(grep -oE 'immortalwrt-imagebuilder-[^"]+\.Linux-x86_64\.tar\.(zst|xz)' index.html | head -n 1 || true)"
          fi

          if [ -z "$IB_FILE" ]; then
            echo "Cannot find ImageBuilder file in ${BASE_URL}"
            echo "$INDEX" | head -200
            exit 1
          fi

          echo "ImageBuilder: $IB_FILE"
          curl -fL -o "$IB_FILE" "${BASE_URL}/${IB_FILE}"

          case "$IB_FILE" in
            *.tar.zst) tar --zstd -xf "$IB_FILE" ;;
            *.tar.xz) tar -xf "$IB_FILE" ;;
          esac

          mv immortalwrt-imagebuilder-* ../imagebuilder

      - name: Prepare package list
        shell: bash
        run: |
          set -eux
          awk 'NF && $1 !~ /^#/' packages.txt | tr '\n' ' ' > package-list.txt
          cat package-list.txt

      - name: Build firmware
        shell: bash
        run: |
          set -eux
          cd imagebuilder
          make image \
            PROFILE="${{ github.event.inputs.profile }}" \
            PACKAGES="$(cat ../package-list.txt)" \
            FILES="../files" \
            DISABLED_SERVICES="" \
            CONFIG_TARGET_ROOTFS_PARTSIZE="${{ github.event.inputs.rootfs_mb }}" \
            V=s

      - name: Collect firmware
        shell: bash
        run: |
          set -eux
          mkdir -p firmware
          find imagebuilder/bin/targets -type f \( -name "*.img.gz" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) -print -exec cp {} firmware/ \;
          ls -lh firmware

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-j1900-ultimate-firmware
          path: firmware/*
          if-no-files-found: error
